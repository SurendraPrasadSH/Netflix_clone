version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: netflix-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - netflix-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netflix-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    networks:
      - netflix-net
    restart: unless-stopped

  ml-service:                          
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: netflix-ml
    ports:
      - "8000:8000"
    env_file:
      - ./ml-service/.env
    networks:
      - netflix-net
    restart: unless-stopped

networks:
  netflix-net:
    driver: bridge
